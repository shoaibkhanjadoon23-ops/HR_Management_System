<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Owner Console</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="main-content" style="margin-left:0;width:100%">
  <header class="header">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
      <div class="header-title">
        <h2>Owner Console</h2>
        <p>Every company registered on HRPro</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="openChangePwdModal()"><i class="fas fa-key"></i> Change Password</button>
      <button class="btn btn-secondary" onclick="ownerLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </header>

  <div class="page-content">
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-icon purple"><i class="fas fa-building"></i></div><div><div class="stat-value" id="statCompanies">-</div><div class="stat-label">Companies</div></div></div>
      <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-users"></i></div><div><div class="stat-value" id="statUsers">-</div><div class="stat-label">Registered Accounts</div></div></div>
      <div class="stat-card"><div class="stat-icon indigo"><i class="fas fa-briefcase"></i></div><div><div class="stat-value" id="statJobs">-</div><div class="stat-label">Job Postings</div></div></div>
      <div class="stat-card"><div class="stat-icon yellow"><i class="fas fa-file-alt"></i></div><div><div class="stat-value" id="statApps">-</div><div class="stat-label">Applications</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><i class="fas fa-clipboard-check"></i></div><div><div class="stat-value" id="statAssessments">-</div><div class="stat-label">Assessments</div></div></div>
      <div class="stat-card"><div class="stat-icon teal"><i class="fas fa-id-badge"></i></div><div><div class="stat-value" id="statEmployees">-</div><div class="stat-label">Employee Records</div></div></div>
    </div>

    <div class="card">
      <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
        <h3><i class="fas fa-building"></i> Registered Companies</h3>
        <div style="display:flex;gap:8px">
          <input id="searchInput" type="text" placeholder="Search by company name..." style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;min-width:240px" oninput="debouncedSearch()">
          <button class="btn btn-secondary" onclick="loadCompanies()"><i class="fas fa-rotate"></i></button>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Company</th><th>Admin</th><th>Industry</th>
              <th>Users</th><th>Jobs</th><th>Applications</th><th>Assessments</th><th>Employees</th>
              <th>Registered</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="companiesBody">
            <tr><td colspan="10" style="text-align:center;padding:40px"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Company Detail Modal -->
<div class="modal-overlay" id="detailModal" style="display:none">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3><i class="fas fa-building"></i> <span id="detailCompanyName">Company</span></h3>
      <button class="modal-close" onclick="closeModal('detailModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="detailBody">
      <div class="spinner"><i class="fas fa-spinner fa-spin"></i></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('detailModal')">Close</button>
      <button class="btn btn-danger" id="detailDeleteBtn" onclick="confirmDeleteFromDetail()"><i class="fas fa-trash"></i> Delete Company</button>
    </div>
  </div>
</div>

<!-- Change Password Modal -->
<div class="modal-overlay" id="pwdModal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3><i class="fas fa-key"></i> Change Password</h3>
      <button class="modal-close" onclick="closeModal('pwdModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" id="curPwd" placeholder="Current password">
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="newPwd" placeholder="At least 8 characters">
      </div>
      <div id="pwdMsg" class="alert" style="display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('pwdModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitChangePwd()">Update Password</button>
    </div>
  </div>
</div>

<script>
const BACKEND_URL = "https://hrhiringpro-hrpro.hf.space";
const token = localStorage.getItem('owner_token');
if (!token) window.location.href = '/owner_login.html';

let searchDebounce = null;
let pendingDeleteId = null;

async function ownerFetch(path, options = {}) {
  const res = await fetch(`${BACKEND_URL}${path}`, {
    ...options,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(options.headers || {}) }
  });
  if (res.status === 401 || res.status === 403) {
    localStorage.removeItem('owner_token');
    window.location.href = '/owner_login.html';
    throw new Error('Not authorized');
  }
  return res;
}

async function loadOverview() {
  try {
    const res = await ownerFetch('/api/owner/overview');
    const d = await res.json();
    statCompanies.textContent = d.total_companies;
    statUsers.textContent = d.total_users;
    statJobs.textContent = d.total_jobs;
    statApps.textContent = d.total_applications;
    statAssessments.textContent = d.total_assessments;
    statEmployees.textContent = d.total_employees;
  } catch (e) { console.error(e); }
}

async function loadCompanies() {
  const search = document.getElementById('searchInput').value.trim();
  const body = document.getElementById('companiesBody');
  body.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';
  try {
    const qs = search ? `?search=${encodeURIComponent(search)}` : '';
    const res = await ownerFetch(`/api/owner/companies${qs}`);
    const companies = await res.json();
    if (!companies.length) {
      body.innerHTML = '<tr><td colspan="10"><div class="empty-state"><i class="fas fa-building"></i><h3>No companies found</h3></div></td></tr>';
      return;
    }
    body.innerHTML = companies.map(c => `
      <tr>
        <td><b>${escapeHtml(c.name || '—')}</b></td>
        <td>${escapeHtml(c.admin_email || '—')}</td>
        <td>${escapeHtml(c.industry || '—')}</td>
        <td>${c.user_count}</td>
        <td>${c.job_count}</td>
        <td>${c.application_count}</td>
        <td>${c.assessment_count}</td>
        <td>${c.employee_count}</td>
        <td>${c.created_at ? new Date(c.created_at).toLocaleDateString() : '—'}</td>
        <td class="table-actions">
          <button class="btn btn-secondary" style="padding:6px 10px" onclick="viewCompany(${c.id})"><i class="fas fa-eye"></i></button>
          <button class="btn btn-danger" style="padding:6px 10px" onclick="deleteCompany(${c.id}, '${escapeHtml(c.name || '')}')"><i class="fas fa-trash"></i></button>
        </td>
      </tr>
    `).join('');
  } catch (e) {
    console.error(e);
    body.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--danger)">Failed to load companies.</td></tr>';
  }
}

function debouncedSearch() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(loadCompanies, 350);
}

async function viewCompany(id) {
  pendingDeleteId = id;
  document.getElementById('detailModal').style.display = 'flex';
  document.getElementById('detailBody').innerHTML = '<div class="spinner"><i class="fas fa-spinner fa-spin"></i></div>';
  try {
    const res = await ownerFetch(`/api/owner/companies/${id}`);
    const c = await res.json();
    document.getElementById('detailCompanyName').textContent = c.name;
    document.getElementById('detailBody').innerHTML = `
      <div class="grid-2" style="margin-bottom:16px">
        <div><b>Phone:</b> ${escapeHtml(c.phone || '—')}</div>
        <div><b>Website:</b> ${escapeHtml(c.website || '—')}</div>
        <div><b>Industry:</b> ${escapeHtml(c.industry || '—')}</div>
        <div><b>Size:</b> ${escapeHtml(c.size || '—')}</div>
        <div style="grid-column:1/-1"><b>Address:</b> ${escapeHtml(c.address || '—')}</div>
      </div>
      <h4 style="margin-bottom:8px"><i class="fas fa-users"></i> Users (${c.users.length})</h4>
      <div class="table-wrapper" style="margin-bottom:16px">
        <table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Active</th></tr></thead>
        <tbody>${c.users.map(u => `<tr><td>${escapeHtml(u.full_name || '—')}</td><td>${escapeHtml(u.email)}</td><td>${escapeHtml(u.role)}</td><td>${u.is_active ? 'Yes' : 'No'}</td></tr>`).join('') || '<tr><td colspan="4">No users</td></tr>'}</tbody></table>
      </div>
      <h4 style="margin-bottom:8px"><i class="fas fa-briefcase"></i> Jobs (${c.jobs.length})</h4>
      <div class="table-wrapper" style="margin-bottom:16px">
        <table><thead><tr><th>Title</th><th>Status</th><th>Created</th></tr></thead>
        <tbody>${c.jobs.map(j => `<tr><td>${escapeHtml(j.title)}</td><td>${escapeHtml(j.status)}</td><td>${j.created_at ? new Date(j.created_at).toLocaleDateString() : '—'}</td></tr>`).join('') || '<tr><td colspan="3">No jobs</td></tr>'}</tbody></table>
      </div>
      <h4 style="margin-bottom:8px"><i class="fas fa-id-badge"></i> Employees (${c.employees.length})</h4>
      <div class="table-wrapper">
        <table><thead><tr><th>Name</th><th>Department</th><th>Position</th><th>Status</th></tr></thead>
        <tbody>${c.employees.map(e => `<tr><td>${escapeHtml(e.full_name)}</td><td>${escapeHtml(e.department || '—')}</td><td>${escapeHtml(e.position || '—')}</td><td>${escapeHtml(e.status)}</td></tr>`).join('') || '<tr><td colspan="4">No employees</td></tr>'}</tbody></table>
      </div>
    `;
  } catch (e) {
    document.getElementById('detailBody').innerHTML = '<p style="color:var(--danger)">Failed to load company details.</p>';
  }
}

function confirmDeleteFromDetail() {
  const name = document.getElementById('detailCompanyName').textContent;
  closeModal('detailModal');
  deleteCompany(pendingDeleteId, name);
}

async function deleteCompany(id, name) {
  // Deliberately a real, typed confirmation rather than a single OK/Cancel click —
  // this permanently deletes every job, application, assessment, and employee record
  // for the company, so a stray click shouldn't be enough to trigger it.
  const typed = prompt(`This will PERMANENTLY delete "${name}" and all of its jobs, applications, assessments, and employee records.\n\nType the company name to confirm:`);
  if (typed !== name) {
    if (typed !== null) alert('Name did not match — nothing was deleted.');
    return;
  }
  try {
    const res = await ownerFetch(`/api/owner/companies/${id}`, { method: 'DELETE' });
    if (res.ok) {
      loadCompanies();
      loadOverview();
    } else {
      const d = await res.json();
      alert(d.detail || 'Failed to delete company');
    }
  } catch (e) {
    alert('Connection error while deleting.');
  }
}

function openChangePwdModal() {
  document.getElementById('curPwd').value = '';
  document.getElementById('newPwd').value = '';
  document.getElementById('pwdMsg').style.display = 'none';
  document.getElementById('pwdModal').style.display = 'flex';
}

async function submitChangePwd() {
  const current_password = document.getElementById('curPwd').value;
  const new_password = document.getElementById('newPwd').value;
  const msg = document.getElementById('pwdMsg');
  try {
    const res = await fetch(`${BACKEND_URL}/api/owner/change-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ current_password, new_password })
    });
    const data = await res.json();
    msg.style.display = 'block';
    msg.className = res.ok ? 'alert alert-success' : 'alert alert-error';
    msg.textContent = data.message || data.detail || (res.ok ? 'Updated' : 'Failed');
  } catch (e) {
    msg.style.display = 'block';
    msg.className = 'alert alert-error';
    msg.textContent = 'Connection error.';
  }
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function ownerLogout() {
  localStorage.removeItem('owner_token');
  localStorage.removeItem('owner_user');
  window.location.href = '/owner_login.html';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

loadOverview();
loadCompanies();
</script>
</body>
</html>
