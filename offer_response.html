<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offer Response - HRPro</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body style="background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
<div style="max-width:500px;width:100%;background:white;border-radius:20px;padding:48px;text-align:center;box-shadow:var(--shadow-lg)">
  {% if action == 'accepted' %}
  <div style="font-size:72px;margin-bottom:20px">🎉</div>
  <h1 style="font-size:28px;font-weight:800;color:var(--success);margin-bottom:12px">Welcome to the Team!</h1>
  {% else %}
  <div style="font-size:72px;margin-bottom:20px">👋</div>
  <h1 style="font-size:28px;font-weight:800;color:var(--text);margin-bottom:12px">Thank You</h1>
  {% endif %}
  <p style="font-size:16px;line-height:1.7;color:var(--text-light);margin-bottom:24px">{{ message }}</p>
  {% if action == 'accepted' %}
  <div class="alert alert-success"><i class="fas fa-envelope"></i> A welcome email has been sent to your inbox with all the details you need for your first day.</div>
  {% endif %}
  <div style="margin-top:24px;font-size:13px;color:var(--text-light)">
    <div style="display:flex;align-items:center;justify-content:center;gap:8px">
      <div style="width:32px;height:32px;background:var(--gradient);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:14px"><i class="fas fa-users-cog"></i></div>
      <span><b>HRPro</b> — HR Management System</span>
    </div>
  </div>
</div>
</body>
</html>
