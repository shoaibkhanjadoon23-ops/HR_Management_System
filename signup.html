<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - HR Management System</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">
<div class="auth-container signup-container">
  <div class="auth-card wide-card">
    <div class="auth-logo">
      <div class="logo-icon"><i class="fas fa-users-cog"></i></div>
      <h1>HR<span>Pro</span></h1>
      <p>Create your HR Management Account</p>
    </div>
    <form id="signupForm" class="auth-form">
      <div class="form-sections">
        <!-- Section 1: Personal Info -->
        <div class="form-section">
          <h3><i class="fas fa-user"></i> Personal Information</h3>
          <div class="form-grid-2">
            <div class="form-group">
              <label>Full Name *</label>
              <input type="text" id="full_name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
              <label>Username *</label>
              <input type="text" id="username" placeholder="johndoe" required>
            </div>
            <div class="form-group">
              <label>Email Address *</label>
              <input type="email" id="email" placeholder="john@company.com" required>
            </div>
            <div class="form-group">
              <label>Phone Number *</label>
              <input type="tel" id="phone" placeholder="+1234567890" required>
            </div>
            <div class="form-group">
              <label>Password *</label>
              <div class="password-wrap">
                <input type="password" id="password" placeholder="Min 8 characters" required minlength="8">
                <button type="button" class="pwd-toggle" onclick="togglePwd('password')"><i class="fas fa-eye"></i></button>
              </div>
            </div>
            <div class="form-group">
              <label>Confirm Password *</label>
              <div class="password-wrap">
                <input type="password" id="confirm_password" placeholder="Repeat password" required>
                <button type="button" class="pwd-toggle" onclick="togglePwd('confirm_password')"><i class="fas fa-eye"></i></button>
              </div>
            </div>
            <div class="form-group">
              <label>Your Role/Department</label>
              <input type="text" id="department" placeholder="HR Manager">
            </div>
            <div class="form-group">
              <label>Location</label>
              <input type="text" id="location" placeholder="New York, USA">
            </div>
          </div>
        </div>

        <!-- Section 2: Company Info -->
        <div class="form-section">
          <h3><i class="fas fa-building"></i> Company Information</h3>
          <div class="form-grid-2">
            <div class="form-group">
              <label>Company Name *</label>
              <input type="text" id="company_name" placeholder="TechCorp Inc." required>
            </div>
            <div class="form-group">
              <label>Company Phone *</label>
              <input type="tel" id="company_phone" placeholder="+1800123456" required>
            </div>
            <div class="form-group form-group-full">
              <label>Company Address *</label>
              <input type="text" id="company_address" placeholder="123 Business Ave, Suite 100" required>
            </div>
            <div class="form-group">
              <label>Company Website</label>
              <input type="url" id="company_website" placeholder="https://techcorp.com">
            </div>
            <div class="form-group">
              <label>Industry</label>
              <select id="industry">
                <option value="">Select Industry</option>
                <option>Technology</option>
                <option>Healthcare</option>
                <option>Finance</option>
                <option>Education</option>
                <option>Retail</option>
                <option>Manufacturing</option>
                <option>Marketing</option>
                <option>Consulting</option>
                <option>Real Estate</option>
                <option>Other</option>
              </select>
            </div>
            <div class="form-group">
              <label>Company Size</label>
              <select id="company_size">
                <option value="">Select Size</option>
                <option>1-10 employees</option>
                <option>11-50 employees</option>
                <option>51-200 employees</option>
                <option>201-500 employees</option>
                <option>500+ employees</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div id="signupError" class="alert alert-error" style="display:none"></div>
      <div id="signupSuccess" class="alert alert-success" style="display:none"></div>

      <button type="submit" class="btn btn-primary btn-full" id="signupBtn">
        <span class="btn-text"><i class="fas fa-user-plus"></i> Create Account</span>
        <span class="btn-loader" style="display:none"><i class="fas fa-spinner fa-spin"></i></span>
      </button>

      <div class="auth-links">
        <span>Already have an account?</span>
        <a href="/login">Sign In</a>
      </div>
    </form>
  </div>
</div>

<script>
document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pass = document.getElementById('password').value;
  const confirm = document.getElementById('confirm_password').value;
  if (pass !== confirm) { showError('Passwords do not match'); return; }
  
  const btn = document.getElementById('signupBtn');
  btn.querySelector('.btn-text').style.display = 'none';
  btn.querySelector('.btn-loader').style.display = 'inline';
  btn.disabled = true;
  
  const payload = {
    full_name: document.getElementById('full_name').value,
    username: document.getElementById('username').value,
    email: document.getElementById('email').value,
    phone: document.getElementById('phone').value,
    password: pass,
    department: document.getElementById('department').value,
    location: document.getElementById('location').value,
    company_name: document.getElementById('company_name').value,
    company_phone: document.getElementById('company_phone').value,
    company_address: document.getElementById('company_address').value,
    company_website: document.getElementById('company_website').value,
    industry: document.getElementById('industry').value,
    company_size: document.getElementById('company_size').value
  };
  
  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('user', JSON.stringify(data.user));
      document.getElementById('signupSuccess').textContent = 'Account created! Redirecting...';
      document.getElementById('signupSuccess').style.display = 'block';
      setTimeout(() => window.location.href = '/dashboard', 1500);
    } else {
      showError(data.detail || 'Signup failed');
    }
  } catch(e) {
    showError('Connection error. Please try again.');
  } finally {
    btn.querySelector('.btn-text').style.display = 'inline';
    btn.querySelector('.btn-loader').style.display = 'none';
    btn.disabled = false;
  }
});

function showError(msg) {
  const el = document.getElementById('signupError');
  el.textContent = msg;
  el.style.display = 'block';
  el.scrollIntoView({behavior:'smooth'});
}

function togglePwd(id) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
